openapi: 3.0.3
info:
  title: Digital Wallet API
  description: >
    Digital Wallet backend (FinTech intern project). Modular-layered monolith
    exposing user auth, wallet balances, top-up, P2P transfer, merchant payment,
    transaction history, and admin operations. See SRS.md / HLD.md / LLD.md.
  version: "1.0"
servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Auth
    description: Registration and login (FR-1)
  - name: Users
    description: Current-user profile
  - name: Wallets
    description: Balance and top-up (FR-2, FR-3)
  - name: Transfers
    description: Peer-to-peer transfer (FR-4)
  - name: Payments
    description: Merchant payment (FR-5)
  - name: Transactions
    description: Transaction history (FR-6)
  - name: Admin
    description: Admin user list and reversal (FR-8)
  - name: Admin Observability
    description: >
      Optional endpoints — only relevant if you built the extended audit
      schema (processor_authorizations, auth_audit_log). Not required by
      the base SRS/LLD.

security:
  - bearerAuth: []

paths:
  # ---------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Creates the user and automatically creates a zero-balance wallet (FR-2).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          description: Email or username already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in and obtain a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------
  # Users
  # ---------------------------------------------------------------
  /api/users/me:
    get:
      tags: [Users]
      summary: Get the current authenticated user's profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------
  # Wallets
  # ---------------------------------------------------------------
  /api/wallets/me:
    get:
      tags: [Wallets]
      summary: Get the current user's wallet balance
      responses:
        "200":
          description: Wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/wallets/topup:
    post:
      tags: [Wallets]
      summary: Top up the current user's wallet
      description: >
        Authorizes the amount via the external processor before crediting.
        On DECLINED or TIMEOUT, balance is unchanged and the transaction is FAILED (FR-3).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopUpRequest"
      responses:
        "200":
          description: Top-up result (also returned unchanged on a replayed idempotency key)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TxResult"
        "402":
          description: Processor declined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Processor timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------
  # Transfers
  # ---------------------------------------------------------------
  /api/transfers:
    post:
      tags: [Transfers]
      summary: Transfer funds to another user (atomic, no external processor)
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferRequest"
      responses:
        "200":
          description: Transfer result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TxResult"
        "422":
          description: Insufficient funds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                timestamp: "2026-07-13T10:00:00Z"
                status: 422
                error: "INSUFFICIENT_FUNDS"
                message: "Sender balance is lower than the transfer amount."
                correlationId: "b3f1c2..."
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Target user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------
  # Payments
  # ---------------------------------------------------------------
  /api/payments:
    post:
      tags: [Payments]
      summary: Pay a registered merchant
      description: Authorizes via the external processor before moving funds (FR-5).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequest"
      responses:
        "200":
          description: Payment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TxResult"
        "402":
          description: Processor declined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Processor timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Merchant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------
  # Transactions
  # ---------------------------------------------------------------
  /api/transactions:
    get:
      tags: [Transactions]
      summary: List the current user's transaction history
      description: Reverse-chronological, filterable, paginated (FR-6).
      parameters:
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TxType"
        - name: from
          in: query
          required: false
          description: Start of date range (inclusive)
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          description: End of date range (inclusive)
          schema:
            type: string
            format: date
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionPage"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get a single transaction's detail
      parameters:
        - $ref: "#/components/parameters/TransactionId"
      responses:
        "200":
          description: Transaction detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Transaction does not belong to the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------
  # Admin
  # ---------------------------------------------------------------
  /api/admin/users:
    get:
      tags: [Admin]
      summary: List all users (admin only)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  page:
                    type: integer
                  size:
                    type: integer
                  totalElements:
                    type: integer
                  totalPages:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/transactions/{id}/reverse:
    post:
      tags: [Admin]
      summary: Reverse a transaction (admin only)
      description: >
        Creates a compensating REVERSAL transaction and ledger entries,
        restoring balances (FR-8).
      parameters:
        - $ref: "#/components/parameters/TransactionId"
      responses:
        "200":
          description: Reversal result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TxResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Transaction already reversed or not in a reversible state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/users/{id}/disable:
    patch:
      tags: [Admin]
      summary: Toggle user enabled/disabled status (admin only)
      description: >
        Toggles the `enabled` field on a user account. When disabled, the user
        cannot log in. Admin users cannot be disabled.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/users/{id}:
    delete:
      tags: [Admin]
      summary: Delete a user (admin only)
      description: Permanently deletes a user account. Admin users cannot be deleted.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: User deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Client-supplied key; a repeated request with the same key returns the original result (FR-7).
      schema:
        type: string
        example: "6c9b7e2a-6b7a-4b41-9f7e-2b6a7e2a6b7a"

    TransactionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Authenticated but not permitted (e.g. non-admin calling an admin route)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    Role:
      type: string
      enum: [USER, MERCHANT, ADMIN]

    TxType:
      type: string
      enum: [TOP_UP, TRANSFER, PAYMENT, REVERSAL]

    TxStatus:
      type: string
      enum: [PENDING, SUCCESS, FAILED, REVERSED]

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          example: "alice_smith"
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT bearer token
        expiresAt:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/Role"
        createdAt:
          type: string
          format: date-time

    Wallet:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        balance:
          type: number
          format: double
          example: 125.50
        currency:
          type: string
          example: "USD"

    TopUpRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          format: double
          minimum: 0.01
          example: 50.00

    TransferRequest:
      type: object
      required: [toUserId, amount]
      properties:
        toUserId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0.01

    PaymentRequest:
      type: object
      required: [merchantId, amount]
      properties:
        merchantId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          minimum: 0.01

    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/TxType"
        amount:
          type: number
          format: double
        status:
          $ref: "#/components/schemas/TxStatus"
        sourceWalletId:
          type: string
          format: uuid
          nullable: true
        targetWalletId:
          type: string
          format: uuid
          nullable: true
        reversedTransactionId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time

    TxResult:
      type: object
      properties:
        transaction:
          $ref: "#/components/schemas/Transaction"
        walletBalance:
          type: number
          format: double
          description: Balance of the acting user's wallet after this operation

    TransactionPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    AdminUserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/Role"
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
          example: "INSUFFICIENT_FUNDS"
        message:
          type: string
        correlationId:
          type: string
