spring:
  application:
    name: finthos
  docker:
    compose:
      enabled: true
  datasource:
    url: ${FINTHOS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finthos}
    username: ${FINTHOS_DATASOURCE_USERNAME:finthos}
    password: ${FINTHOS_DATASOURCE_PASSWORD:finthos}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    jdbc:
      repositories:
        enabled: true

finthos:
  jwt:
    secret: "dev-only-secret-key-change-me-in-production-0123456789abcdef"
    expiration-ms: 3600000

processor:
  base-url: http://localhost:8072
  timeout-ms: 2000
  retry-count: 1
